<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チャッピー＆サリーのタロットカード</title>

<style>
body{
  font-family:"Hiragino Kaku Gothic ProN", sans-serif;
  text-align:center;
  background:#fff0f5;
  padding:20px;
  color:#5b3a1e;
}

.hidden{
  display:none;
}

.title-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
}

.side-img{
  width:70px;
}

h1{
  color:#5b3a1e;
  font-size:26px;
  line-height:1.4;
}

.header-img{
  width:80%;
  max-width:400px;
  border-radius:20px;
  margin:15px 0;
}

.welcome-img{
  width:85%;
  max-width:420px;
  border-radius:24px;
  margin:20px 0;
  box-shadow:0 8px 18px rgba(0,0,0,0.12);
}

input{
  width:80%;
  max-width:350px;
  padding:12px;
  border-radius:20px;
  border:2px solid #d6b6ff;
  margin-bottom:15px;
  font-size:16px;
}

button{
  padding:12px 22px;
  margin:6px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#f7c1cc,#c9b6ff);
  color:white;
  font-size:16px;
  cursor:pointer;
}

.main-btn{
  background:linear-gradient(135deg,#f7c1cc,#c9b6ff);
}

.boss-btn{
  background:linear-gradient(135deg,#243b6b,#3d5a99,#5d79b8);
}

.back-btn{
  background:linear-gradient(135deg,#9b8fd8,#c1b6f2);
}

.cards-area{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:25px;
}

.card-box{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.card-box img{
  width:160px;
  border-radius:12px;
  box-shadow:0 6px 14px rgba(0,0,0,0.2);
}

.reversed{
  transform:rotate(180deg);
}

.label{
  margin-top:8px;
  font-size:14px;
  color:#5b3a1e;
}

.copy-btn{
  margin-top:8px;
  font-size:22px;
  background:linear-gradient(135deg,#f7c1cc,#e6a4b4,#f3d1dc);
  color:white;
  border:none;
  border-radius:50%;
  padding:10px 14px;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(230,164,180,0.6);
}

.desc{
  font-size:15px;
  color:#6b4b2a;
  margin:8px 0 18px;
}
</style>
</head>

<body>

<!-- ① ようこそ画面 -->
<div id="welcome-screen">
  <div class="title-wrap">
    <img src="images/tarot_back.png" class="side-img">
    <h1>チャッピー＆サリーの<br>タロットカード</h1>
    <img src="images/tarot_back.png" class="side-img">
  </div>

  <img src="images/CS_hyousi.jpg" class="welcome-img">

  <p class="desc">チャッピーとサリーの部屋へようこそ✨</p>

  <button class="main-btn" onclick="showTarotScreen()">入店する🔘</button>
</div>

<!-- ② タロット画面 -->
<div id="tarot-screen" class="hidden">
  <div class="title-wrap">
    <img src="images/tarot_back.png" class="side-img">
    <h1>チャッピー＆サリーの<br>タロットカード</h1>
    <img src="images/tarot_back.png" class="side-img">
  </div>

  <img src="images/CS_hyousi.jpg" class="header-img">

  <input id="question" placeholder="今日の問いを入れてから引く">

  <div>
    <button class="main-btn" onclick="drawOne()">1枚引き</button>
    <button class="main-btn" onclick="drawThree()">3枚引き</button>
    <button class="main-btn" onclick="resetCards()">リセット</button>
  </div>

  <div>
    <button class="boss-btn" onclick="showBossScreen()">ラスボスをみつける🔘</button>
  </div>
</div>

<!-- ③ ラスボス画面 -->
<div id="boss-screen" class="hidden">
  <div class="title-wrap">
    <img src="images/tarot_back.png" class="side-img">
    <h1>ラスボスをみつける</h1>
    <img src="images/tarot_back.png" class="side-img">
  </div>

  <p class="desc">今の心のラスボスをのぞいてみる？</p>

  <div>
    <button class="boss-btn" onclick="drawBossOne()">1枚引き</button>
    <button class="boss-btn" onclick="drawBossThree()">3枚引き</button>
    <button class="back-btn" onclick="showTarotScreen()">タロットへ戻る</button>
  </div>
</div>

<!-- 共通の表示エリア -->
<div class="cards-area" id="cards"></div>

<script>
/* =========================
   画面切り替え
========================= */
function showTarotScreen(){
  document.getElementById("welcome-screen").classList.add("hidden");
  document.getElementById("boss-screen").classList.add("hidden");
  document.getElementById("tarot-screen").classList.remove("hidden");
  resetCardsOnly();
}

function showBossScreen(){
  document.getElementById("welcome-screen").classList.add("hidden");
  document.getElementById("tarot-screen").classList.add("hidden");
  document.getElementById("boss-screen").classList.remove("hidden");
  resetCardsOnly();
}

/* =========================
   タロット画像
========================= */
const cardFiles = [
  "00_The_Fool.png",
  "01_The_Magician.png",
  "02_The_High_Priestess.png",
  "03_The_Empress.png",
  "04_The_Emperor.png",
  "05_The_Hierophant.png",
  "06_The_Lovers.png",
  "07_The_Chariot.png",
  "08_Strength.png",
  "09_The_Hermit.png",
  "10_Wheel_of_Fortune.png",
  "11_Justice.png",
  "12_The_Hanged_Man.png",
  "13_Death.png",
  "14_Temperance.png",
  "15_The_Devil.png",
  "16_The_Tower.png",
  "17_The_Star.png",
  "18_The_Moon.png",
  "19_The_Sun.png",
  "20_Judgement.png",
  "21_The_World.png",
  "22_Compass.png"
];

/* =========================
   ラスボス画像
========================= */
const bossFiles = [
  "boss_people_eyes.png",
  "boss_perfection.png",
  "boss_fear_of_failure.png",
  "boss_low_confidence.png",
  "boss_comparison.png",
  "boss_impatience.png",
  "boss_anxiety.png",
  "boss_attachment.png",
  "boss_past.png",
  "boss_future_worry.png",
  "boss_money.png",
  "boss_overwork.png",
  "boss_guilt.png",
  "boss_give_up.png",
  "boss_endurance.png",
  "boss_obligation.png",
  "boss_hesitation.png",
  "boss_return_to_self.png"
];

/* =========================
   共通
========================= */
function getRandomItem(list){
  return list[Math.floor(Math.random() * list.length)];
}

function copyToClipboard(text){
  navigator.clipboard.writeText(text);
  alert("コピーしたよ✨\n" + text);
}

/* =========================
   タロットカード作成
========================= */
function createTarotCard(labelText){
  const card = getRandomItem(cardFiles);

  const box = document.createElement("div");
  box.className = "card-box";

  const img = document.createElement("img");
  img.src = "images/" + card;

  const reversed = Math.random() < 0.5;
  if(reversed){
    img.classList.add("reversed");
  }

  const copyText = card.replace(".png","") + (reversed ? "（逆位置）" : "（正位置）");

  const label = document.createElement("div");
  label.className = "label";
  label.textContent = labelText;

  const copyBtn = document.createElement("button");
  copyBtn.className = "copy-btn";
  copyBtn.textContent = "🐾";
  copyBtn.onclick = () => copyToClipboard(copyText);

  box.appendChild(img);
  if(labelText !== ""){
    box.appendChild(label);
  }
  box.appendChild(copyBtn);

  return box;
}

/* =========================
   ラスボスカード作成
========================= */
function createBossCard(labelText){
  const boss = getRandomItem(bossFiles);

  const box = document.createElement("div");
  box.className = "card-box";

  const img = document.createElement("img");
  img.src = "images/" + boss;

  const label = document.createElement("div");
  label.className = "label";
  label.textContent = labelText;

  const copyText = boss.replace(".png","");

  const copyBtn = document.createElement("button");
  copyBtn.className = "copy-btn";
  copyBtn.textContent = "🐾";
  copyBtn.onclick = () => copyToClipboard(copyText);

  box.appendChild(img);
  box.appendChild(label);
  box.appendChild(copyBtn);

  return box;
}

/* =========================
   タロット
========================= */
function drawOne(){
  const area = document.getElementById("cards");
  area.innerHTML = "";
  area.appendChild(createTarotCard(""));
}

function drawThree(){
  const area = document.getElementById("cards");
  area.innerHTML = "";
  area.appendChild(createTarotCard(""));
  area.appendChild(createTarotCard(""));
  area.appendChild(createTarotCard(""));
}

/* =========================
   ラスボス
========================= */
function drawBossOne(){
  const area = document.getElementById("cards");
  area.innerHTML = "";
  area.appendChild(createBossCard("今のラスボス"));
}

function drawBossThree(){
  const area = document.getElementById("cards");
  area.innerHTML = "";
  area.appendChild(createBossCard("今のラスボス"));
  area.appendChild(createBossCard("隠れラスボス"));
  area.appendChild(createBossCard("心のボス戦"));
}

/* =========================
   リセット
========================= */
function resetCards(){
  document.getElementById("cards").innerHTML = "";
  document.getElementById("question").value = "";
}

function resetCardsOnly(){
  document.getElementById("cards").innerHTML = "";
}
</script>

</body>
</html>
