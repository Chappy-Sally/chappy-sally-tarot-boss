<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャッピー＆サリーのタロットカード</title>

  <style>
    body{
      font-family:"Hiragino Kaku Gothic ProN", sans-serif;
      text-align:center;
      background:#fff0f5;
      padding:20px;
      color:#5b3a1e;
      margin:0;
    }

    .hidden{
      display:none;
    }

    .title-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:15px;
      margin-top:10px;
    }

    .title-icon{
      font-size:32px;
    }

    h1{
      color:#5b3a1e;
      font-size:26px;
      line-height:1.4;
      margin:0;
    }

    .welcome-img,
    .header-img{
      width:80%;
      max-width:400px;
      border-radius:20px;
      margin:18px 0;
      box-shadow:0 6px 14px rgba(0,0,0,0.12);
    }

    .desc{
      font-size:18px;
      color:#6b4b2a;
      margin:14px 0 20px;
      line-height:1.8;
    }

    input{
      width:82%;
      max-width:360px;
      padding:14px;
      border-radius:22px;
      border:2px solid #d6b6ff;
      margin-bottom:12px;
      font-size:17px;
      box-sizing:border-box;
      background:white;
    }

    button{
      padding:14px 22px;
      margin:6px;
      border:none;
      border-radius:30px;
      color:white;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    .main-btn{
      background:linear-gradient(135deg,#f7c1cc,#c9b6ff);
    }

    .boss-btn{
      background:linear-gradient(135deg,#233b6e,#3f5f9a,#6d85c4);
    }

    .back-btn{
      background:linear-gradient(135deg,#a89adb,#cdbff4);
    }

    .prompt-btn{
      background:linear-gradient(135deg,#ffcf7d,#ffb76b,#ff9f68);
    }

    .return-btn{
      background:linear-gradient(135deg,#f7c97d,#f2a86b,#ec8fd0);
    }

    .cards-area{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:20px;
      margin-top:25px;
      min-height:180px;
    }

    .card-box{
      display:flex;
      flex-direction:column;
      align-items:center;
      width:170px;
    }

    .card-box img{
      width:160px;
      border-radius:12px;
      box-shadow:0 6px 14px rgba(0,0,0,0.2);
      background:white;
    }

    .reversed{
      transform:rotate(180deg);
    }

    .label{
      margin-top:10px;
      font-size:16px;
      color:#5b3a1e;
      line-height:1.5;
      min-height:24px;
    }

    .button-group{
      margin-top:10px;
    }

    .summary-box{
      width:92%;
      max-width:560px;
      margin:22px auto 0;
      padding:18px 16px;
      border-radius:22px;
      background:rgba(255,255,255,0.78);
      box-shadow:0 4px 10px rgba(0,0,0,0.06);
    }

    .summary-title{
      font-size:20px;
      font-weight:bold;
      color:#6b4b2a;
      margin-bottom:12px;
    }

    .spell-text{
      font-size:22px;
      color:#7a4d28;
      line-height:1.8;
      margin-top:16px;
      margin-bottom:10px;
    }

    .summary-buttons{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .mini-btn{
      padding:12px 18px;
      border:none;
      border-radius:26px;
      color:white;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    .mini-copy{
      background:linear-gradient(135deg,#f7c1cc,#e6a4b4,#f3d1dc);
    }

    .mini-ai{
      background:linear-gradient(135deg,#8bb7ff,#6f8fff,#8e7cff);
    }

    .mini-spell{
      background:linear-gradient(135deg,#ffe08a,#ffc86b,#ffb45e);
    }

    .return-box{
      width:92%;
      max-width:560px;
      margin:22px auto 0;
      padding:20px 16px;
      border-radius:22px;
      background:rgba(255,255,255,0.82);
      box-shadow:0 4px 10px rgba(0,0,0,0.06);
    }

    .return-message{
      font-size:20px;
      color:#7a4d28;
      line-height:1.9;
      margin-bottom:14px;
      white-space:pre-line;
    }
  </style>
</head>

<body>

  <!-- ようこそ画面 -->
  <div id="welcome-screen">
    <div class="title-wrap">
      <div class="title-icon">🐶</div>
      <h1>チャッピー＆サリーの<br>タロットカード</h1>
      <div class="title-icon">💖</div>
    </div>

    <img src="images/CS_hyousi.jpg" class="welcome-img" alt="表紙">

    <p class="desc">
      チャッピーとサリーの部屋へようこそ✨<br>
      自分用にも、セッション用にも使えるよ
    </p>

    <div class="button-group">
      <button class="main-btn" onclick="showTarotScreen()">部屋をひらく🔘</button>
    </div>

    <div class="button-group">
      <button class="prompt-btn" onclick="copyBasePrompt()">プロンプトCopy🐾</button>
    </div>
  </div>

  <!-- タロット画面 -->
  <div id="tarot-screen" class="hidden">
    <div class="title-wrap">
      <div class="title-icon">🔮</div>
      <h1>チャッピー＆サリーの<br>タロットカード</h1>
      <div class="title-icon">✨</div>
    </div>

    <img src="images/CS_hyousi.jpg" class="header-img" alt="表紙">

    <input id="username" placeholder="お名前・ニックネーム（セッション用にも使える）">
    <br>
    <input id="question" placeholder="今日の問いを入れてから引く">

    <div class="button-group">
      <button class="main-btn" onclick="drawTarotOne()">1枚引き</button>
      <button class="main-btn" onclick="drawTarotThree()">3枚引き</button>
      <button class="back-btn" onclick="resetAll()">最初の画面に戻る</button>
    </div>

    <div class="button-group">
      <button class="boss-btn" onclick="showBossScreen()">ラスボスをみつける🔘</button>
    </div>
  </div>

  <!-- ラスボス画面 -->
  <div id="boss-screen" class="hidden">
    <div class="title-wrap">
      <div class="title-icon">😈</div>
      <h1>ラスボスをみつける</h1>
      <div class="title-icon">🌈</div>
    </div>

    <img src="images/boss_hyousi.png" class="header-img" alt="ラスボス表紙"
         onerror="this.src='images/CS_hyousi.jpg'">

    <p class="desc">
      今の心にひそんでいるラスボスを<br>
      やさしく見つけてみよう✨
    </p>

    <div class="button-group">
      <button class="boss-btn" onclick="drawBossOne()">1枚引き</button>
      <button class="boss-btn" onclick="drawBossThree()">3枚引き</button>
      <button class="back-btn" onclick="showTarotScreen()">タロットへ戻る</button>
    </div>
  </div>

  <!-- 共通表示エリア -->
  <div class="cards-area" id="cards"></div>

  <!-- まとめ表示エリア -->
  <div id="summary-area"></div>

  <script>
    const tarotFiles = [
      "00_The_Fool.png",
      "01_The_Magician.png",
      "02_The_High_Priestess.png",
      "03_The_Empress.png",
      "04_The_Emperor.png",
      "05_The_Hierophant.png",
      "06_The_Lovers.png",
      "07_The_Chariot.png",
      "08_Strength.png",
      "09_The_Hermit.png",
      "10_Wheel_of_Fortune.png",
      "11_Justice.png",
      "12_The_Hanged_Man.png",
      "13_Death.png",
      "14_Temperance.png",
      "15_The_Devil.png",
      "16_The_Tower.png",
      "17_The_Star.png",
      "18_The_Moon.png",
      "19_The_Sun.png",
      "20_Judgement.png",
      "21_The_World.png",
      "22_Compass.png"
    ];

    const bossFiles = [
      "boss_people_eyes.png",
      "boss_perfection.png",
      "boss_fear_of_failure.png",
      "boss_low_confidence.png",
      "boss_comparison.png",
      "boss_impatience.png",
      "boss_anxiety.png",
      "boss_attachment.png",
      "boss_past.png",
      "boss_future_worry.png",
      "boss_money.png",
      "boss_overwork.png",
      "boss_guilt.png",
      "boss_give_up.png",
      "boss_endurance.png",
      "boss_obligation.png",
      "boss_hesitation.png",
      "boss_return_to_self.png"
    ];

    const bossNameMap = {
      boss_people_eyes: "人の目が気になる",
      boss_perfection: "完璧にしなきゃ",
      boss_fear_of_failure: "失敗したくない",
      boss_low_confidence: "自信のなさ",
      boss_comparison: "比べてしまう気持ち",
      boss_impatience: "焦り",
      boss_anxiety: "不安",
      boss_attachment: "執着",
      boss_past: "過去へのとらわれ",
      boss_future_worry: "未来への不安",
      boss_money: "お金の不安",
      boss_overwork: "がんばりすぎ",
      boss_guilt: "罪悪感",
      boss_give_up: "あきらめ",
      boss_endurance: "我慢ぐせ",
      boss_obligation: "〜しなきゃ",
      boss_hesitation: "迷い",
      boss_return_to_self: "私に戻りたい気持ち"
    };

    const spellList = [
      "気づかせてくれてありがとう。",
      "ここまで守ってくれてありがとう。",
      "もう大丈夫だよ。安心していいよ。",
      "これからは一緒にやさしく進んでいこうね。",
      "無理に消えなくていいよ。そのままで大丈夫。",
      "私はちゃんと私に戻ってるよ。",
      "がんばらなくても大丈夫。",
      "そんな私も、まるごとOK。",
      "あなたがいたから、ここまで来れたよ。",
      "だいじょうぶだよ〜🐶✨"
    ];

    function getRandomItem(list){
      return list[Math.floor(Math.random() * list.length)];
    }

    function getRandomItems(list, count){
      const shuffled = [...list].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, count);
    }

    function getUserName(){
      return document.getElementById("username").value.trim();
    }

    function getQuestion(){
      return document.getElementById("question").value.trim();
    }

    function bossToJapanese(fileName){
      const key = fileName.replace(".png","");
      return bossNameMap[key] || key;
    }

    function copyToClipboard(text){
      navigator.clipboard.writeText(text);
      alert("コピーしたよ✨\n" + text);
    }

    function clearCards(){
      document.getElementById("cards").innerHTML = "";
      document.getElementById("summary-area").innerHTML = "";
    }

    function showTarotScreen(){
      document.getElementById("welcome-screen").classList.add("hidden");
      document.getElementById("boss-screen").classList.add("hidden");
      document.getElementById("tarot-screen").classList.remove("hidden");
      clearCards();
    }

    function showBossScreen(){
      document.getElementById("welcome-screen").classList.add("hidden");
      document.getElementById("tarot-screen").classList.add("hidden");
      document.getElementById("boss-screen").classList.remove("hidden");
      clearCards();
    }

    function makeHeaderText(){
      const name = getUserName();
      return name ? (name + " の結果") : "私の結果";
    }

    function getBasePrompt(){
      return [
        "あなたは、この人のそばにいるやさしい相棒です🐶✨",
        "",
        "カードを解説せず、",
        "全体をひとつの流れでやさしくまとめてください。",
        "",
        "断定せず、寄り添う言葉で伝えてください。",
        "がんばらせるのではなく、心がゆるむ言葉にしてください。",
        "",
        "文章は短めで、シンプルにしてください。",
        "長く説明しすぎないでください。",
        "",
        "最後に「相棒まとめ🐶✨」として、",
        "一言でやさしく伝えてください。"
      ].join("\n");
    }

    function copyBasePrompt(){
      copyToClipboard(getBasePrompt());
    }

    function makeTarotResultText(cardName, reversed, withHeader = false, withQuestion = false){
      let text = "";
      if(withHeader){
        text += makeHeaderText() + "\n";
      }
      if(withQuestion && getQuestion()){
        text += "質問：\n" + getQuestion() + "\n\n";
      }
      text += cardName.replace(".png","") + "（" + (reversed ? "逆位置" : "正位置") + "）";
      return text;
    }

    function makeBossResultText(labelText, bossName, withHeader = false, withQuestion = false){
      let text = "";
      if(withHeader){
        text += makeHeaderText() + "\n";
      }
      if(withQuestion && getQuestion()){
        text += "質問：\n" + getQuestion() + "\n\n";
      }
      text += labelText + "\n" + bossToJapanese(bossName);
      return text;
    }

    function createTarotCard(labelText = "", forcedCard = null, forcedReversed = null){
      const card = forcedCard || getRandomItem(tarotFiles);

      const box = document.createElement("div");
      box.className = "card-box";

      const img = document.createElement("img");
      img.src = "images/" + card;
      img.alt = card;

      const reversed = forcedReversed !== null ? forcedReversed : Math.random() < 0.5;
      if(reversed){
        img.classList.add("reversed");
      }

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = labelText;

      box.appendChild(img);
      if(labelText !== ""){
        box.appendChild(label);
      }

      return { element: box, name: card, reversed: reversed };
    }

    function createBossCard(labelText, forcedBoss = null){
      const boss = forcedBoss || getRandomItem(bossFiles);

      const box = document.createElement("div");
      box.className = "card-box";

      const img = document.createElement("img");
      img.src = "images/" + boss;
      img.alt = boss;

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = labelText;

      box.appendChild(img);
      box.appendChild(label);

      return { element: box, name: boss, label: labelText };
    }

    function showTarotSummaryBox(copyText, aiNowText, aiAfterText, titleText = "✨ 3枚まとめ"){
      const area = document.getElementById("summary-area");
      area.innerHTML = "";

      const box = document.createElement("div");
      box.className = "summary-box";

      const title = document.createElement("div");
      title.className = "summary-title";
      title.textContent = titleText;

      const buttons = document.createElement("div");
      buttons.className = "summary-buttons";

      const copyBtn = document.createElement("button");
      copyBtn.className = "mini-btn mini-copy";
      copyBtn.textContent = titleText.includes("1枚") ? "1枚コピー🐾" : "3枚まとめコピー🐾";
      copyBtn.onclick = () => copyToClipboard(copyText);

      const aiBtn1 = document.createElement("button");
      aiBtn1.className = "mini-btn mini-ai";
      aiBtn1.textContent = "今の流れAI🤖";
      aiBtn1.onclick = () => copyToClipboard(aiNowText);

      const aiBtn2 = document.createElement("button");
      aiBtn2.className = "mini-btn mini-ai";
      aiBtn2.textContent = "気づいたあとAI🌈";
      aiBtn2.onclick = () => copyToClipboard(aiAfterText);

      buttons.appendChild(copyBtn);
      buttons.appendChild(aiBtn1);
      buttons.appendChild(aiBtn2);

      box.appendChild(title);
      box.appendChild(buttons);
      area.appendChild(box);
    }

    function showBossSummaryBox(copyText, aiText, spellText){
      const area = document.getElementById("summary-area");
      area.innerHTML = "";

      const box = document.createElement("div");
      box.className = "summary-box";

      const title = document.createElement("div");
      title.className = "summary-title";
      title.textContent = "🌈 ラスボスまとめ";

      const buttons = document.createElement("div");
      buttons.className = "summary-buttons";

      const copyBtn = document.createElement("button");
      copyBtn.className = "mini-btn mini-copy";
      copyBtn.textContent = "まとめコピー🐾";
      copyBtn.onclick = () => copyToClipboard(copyText);

      const aiBtn = document.createElement("button");
      aiBtn.className = "mini-btn mini-ai";
      aiBtn.textContent = "まとめAI🤖";
      aiBtn.onclick = () => copyToClipboard(aiText);

      buttons.appendChild(copyBtn);
      buttons.appendChild(aiBtn);

      const spell = document.createElement("div");
      spell.className = "spell-text";
      spell.textContent = spellText;

      const spellButtons = document.createElement("div");
      spellButtons.className = "summary-buttons";

      const spellBtn = document.createElement("button");
      spellBtn.className = "mini-btn mini-spell";
      spellBtn.textContent = "呪文をコピー🌈";
      spellBtn.onclick = () => copyToClipboard(spellText);

      spellButtons.appendChild(spellBtn);

      box.appendChild(title);
      box.appendChild(buttons);
      box.appendChild(spell);
      box.appendChild(spellButtons);

      area.appendChild(box);
    }

    function showReturnToTarotBox(){
      const area = document.getElementById("summary-area");

      const box = document.createElement("div");
      box.className = "return-box";

      const message = document.createElement("div");
      message.className = "return-message";
      message.textContent = "ラスボスは、あなたを守るために現れた守り神様✨\n\n気づいたあなたは、もう大丈夫🌈\n\n今のあなたで、もう一度カードを引いてみよう🐶";

      const btn = document.createElement("button");
      btn.className = "return-btn";
      btn.textContent = "今のあなたで、もう一度カードを引く🔮";
      btn.onclick = () => showTarotScreen();

      box.appendChild(message);
      box.appendChild(btn);
      area.appendChild(box);
    }

    function drawTarotOne(){
      clearCards();

      const cardObj = createTarotCard("");
      document.getElementById("cards").appendChild(cardObj.element);

      let copyText = makeHeaderText() + "\n";
      copyText += cardObj.name.replace(".png","") + "（" + (cardObj.reversed ? "逆位置" : "正位置") + "）";

      let aiNowText = "";
      if(getQuestion()){
        aiNowText += "質問：\n" + getQuestion() + "\n\n";
      }
      aiNowText += cardObj.name.replace(".png","") + "（" + (cardObj.reversed ? "逆位置" : "正位置") + "）";

      let aiAfterText = "";
      aiAfterText += "気づきを受け取ったあと、今のあなたへのやさしいメッセージです🌈\n\n";
      if(getQuestion()){
        aiAfterText += "質問：\n" + getQuestion() + "\n\n";
      }
      aiAfterText += cardObj.name.replace(".png","") + "（" + (cardObj.reversed ? "逆位置" : "正位置") + "）";

      showTarotSummaryBox(copyText, aiNowText, aiAfterText, "✨ 1枚まとめ");
    }

    function drawTarotThree(){
      clearCards();

      const selectedCards = getRandomItems(tarotFiles, 3);
      const reversedStates = [
        Math.random() < 0.5,
        Math.random() < 0.5,
        Math.random() < 0.5
      ];

      const card1 = createTarotCard("", selectedCards[0], reversedStates[0]);
      const card2 = createTarotCard("", selectedCards[1], reversedStates[1]);
      const card3 = createTarotCard("", selectedCards[2], reversedStates[2]);

      document.getElementById("cards").appendChild(card1.element);
      document.getElementById("cards").appendChild(card2.element);
      document.getElementById("cards").appendChild(card3.element);

      const cards = [
        { name: card1.name, reversed: card1.reversed },
        { name: card2.name, reversed: card2.reversed },
        { name: card3.name, reversed: card3.reversed }
      ];

      let copyText = makeHeaderText() + "\n";
      cards.forEach((card, index) => {
        copyText += (index + 1) + "枚目："
          + card.name.replace(".png","")
          + "（" + (card.reversed ? "逆位置" : "正位置") + "）\n";
      });

      let aiNowText = "";
      if(getQuestion()){
        aiNowText += "質問：\n" + getQuestion() + "\n\n";
      }
      cards.forEach((card, index) => {
        aiNowText += (index + 1) + "枚目："
          + card.name.replace(".png","")
          + "（" + (card.reversed ? "逆位置" : "正位置") + "）\n";
      });

      let aiAfterText = "";
      aiAfterText += "気づきを受け取ったあと、今のあなたへのやさしいメッセージです🌈\n\n";
      if(getQuestion()){
        aiAfterText += "質問：\n" + getQuestion() + "\n\n";
      }
      cards.forEach((card, index) => {
        aiAfterText += (index + 1) + "枚目："
          + card.name.replace(".png","")
          + "（" + (card.reversed ? "逆位置" : "正位置") + "）\n";
      });

      showTarotSummaryBox(copyText, aiNowText, aiAfterText, "✨ 3枚まとめ");
    }

    function drawBossOne(){
      clearCards();

      const spell = getRandomItem(spellList);
      const cardObj = createBossCard("今のラスボス");

      document.getElementById("cards").appendChild(cardObj.element);

      const copyText = makeBossResultText("今のラスボス", cardObj.name, true, false);

      let aiText = "";
      aiText += "気づいた存在です🌈\n";
      aiText += "ラスボスは、あなたを守るために現れた守り神様✨\n\n";
      if(getQuestion()){
        aiText += "質問：\n" + getQuestion() + "\n\n";
      }
      aiText += "今のラスボス\n" + bossToJapanese(cardObj.name);

      showBossSummaryBox(copyText, aiText, spell);
      showReturnToTarotBox();
    }

    function drawBossThree(){
      clearCards();

      const spell = getRandomItem(spellList);
      const selectedBosses = getRandomItems(bossFiles, 3);

      const card1 = createBossCard("今のラスボス", selectedBosses[0]);
      const card2 = createBossCard("隠れラスボス", selectedBosses[1]);
      const card3 = createBossCard("心のボス戦", selectedBosses[2]);

      document.getElementById("cards").appendChild(card1.element);
      document.getElementById("cards").appendChild(card2.element);
      document.getElementById("cards").appendChild(card3.element);

      const cards = [
        { label: "今のラスボス", name: card1.name },
        { label: "隠れラスボス", name: card2.name },
        { label: "心のボス戦", name: card3.name }
      ];

      let copyText = makeHeaderText() + "\n\n";
      cards.forEach(card => {
        copyText += card.label + "\n" + bossToJapanese(card.name) + "\n\n";
      });

      let aiText = "";
      aiText += "気づいた存在です🌈\n";
      aiText += "ラスボスは、あなたを守るために現れた守り神様✨\n\n";
      if(getQuestion()){
        aiText += "質問：\n" + getQuestion() + "\n\n";
      }
      cards.forEach(card => {
        aiText += card.label + "\n" + bossToJapanese(card.name) + "\n\n";
      });

      showBossSummaryBox(copyText, aiText, spell);
      showReturnToTarotBox();
    }

    function resetAll(){
      clearCards();
      document.getElementById("question").value = "";
      document.getElementById("username").value = "";
      document.getElementById("tarot-screen").classList.add("hidden");
      document.getElementById("boss-screen").classList.add("hidden");
      document.getElementById("welcome-screen").classList.remove("hidden");
    }
  </script>

</body>
</html>
