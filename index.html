<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チャッピー＆サリーのタロットカード</title>
<style>
body{
  font-family:"Hiragino Kaku Gothic ProN", sans-serif;
  text-align:center;
  background:#fff0f5;
  padding:20px;
}
button{
  padding:12px 22px;
  margin:6px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#f7c1cc,#c9b6ff);
  color:white;
  font-size:16px;
}
#cards img{
  width:220px;
  border-radius:12px;
  box-shadow:0 6px 14px rgba(0,0,0,0.2);
}
.reversed{
  transform:rotate(180deg);
}
</style>
</head>
<body>

<h1>チャッピー＆サリーのタロットカード</h1>

<p>まずは表示テスト✨</p>

<img src="images/CS_hyousi.jpg" width="300">

<div style="margin-top:20px;">
  <button onclick="drawOne()">タロット1枚</button>
  <button onclick="drawBoss()">ラスボス1枚</button>
</div>

<div id="cards" style="margin-top:30px;"></div>

<script>
const cardFiles = [
"00_The_Fool.png",
"01_The_Magician.png",
"02_The_High_Priestess.png",
"03_The_Empress.png",
"04_The_Emperor.png",
"05_The_Hierophant.png",
"06_The_Lovers.png",
"07_The_Chariot.png",
"08_Strength.png",
"09_The_Hermit.png",
"10_Wheel_of_Fortune.png",
"11_Justice.png",
"12_The_Hanged_Man.png",
"13_Death.png",
"14_Temperance.png",
"15_The_Devil.png",
"16_The_Tower.png",
"17_The_Star.png",
"18_The_Moon.png",
"19_The_Sun.png",
"20_Judgement.png",
"21_The_World.png",
"22_Compass.png"
];

const bossFiles = [
  "boss_people_eyes.png",
  "boss_perfection.png",
  "boss_fear_of_failure.png",
  "boss_low_confidence.png",
  "boss_comparison.png",
  "boss_impatience.png",
  "boss_anxiety.png",
  "boss_attachment.png",
  "boss_past.png",
  "boss_future_worry.png",
  "boss_money.png",
  "boss_overwork.png",
  "boss_guilt.png",
  "boss_give_up.png",
  "boss_endurance.png",
  "boss_obligation.png",
  "boss_hesitation.png",
  "boss_return_to_self.png"
];

function drawOne(){
  const area = document.getElementById("cards");
  area.innerHTML = "";

  const card = cardFiles[Math.floor(Math.random()*cardFiles.length)];
  const img = document.createElement("img");
  img.src = "images/" + card;

  if (Math.random() < 0.5) {
    img.classList.add("reversed");
  }

  area.appendChild(img);
}

function drawBoss(){
  const area = document.getElementById("cards");
  area.innerHTML = "";

  const boss = bossFiles[Math.floor(Math.random() * bossFiles.length)];

  const box = document.createElement("div");
  box.className = "card-box";

  const img = document.createElement("img");
  img.src = "images/" + boss;

  const label = document.createElement("div");
  label.className = "label";
  label.textContent = "今のラスボス";

  box.appendChild(img);
  box.appendChild(label);

  area.appendChild(box);

}
</script>

</body>
</html>
