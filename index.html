<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>チャッピー＆サリー</title>
<style>
body{
  font-family:sans-serif;
  text-align:center;
  background:#f8f0f2;
}
button{
  margin:5px;
  padding:10px;
  border-radius:20px;
  border:none;
  font-size:14px;
}
.copy{background:#f7a8b8;}
.ai{background:#7da2ff;color:#fff;}
.magic{background:#ffc95c;}
.card{
  margin:20px auto;
  width:200px;
}
img{
  width:100%;
  border-radius:15px;
}
.box{
  background:#fff;
  padding:20px;
  border-radius:20px;
  margin:20px;
}
</style>
</head>

<body>

<h2>🐶チャッピー＆サリーの世界🐶</h2>

<img src="images/CS_hyousi.jpg" width="250">

<p>ここは自分にも、誰かにもやさしくなれる場所✨</p>

<button onclick="enter()">🌈はじまる</button>
<button class="copy" onclick="copyPrompt()">🐾プロンプトCopy</button>

<div id="app"></div>

<script>

const tarotImages=[
"01.jpg","02.jpg","03.jpg"
];

const bossImages=[
"boss_01.png","boss_02.png","boss_03.png",
"boss_04.png","boss_05.png","boss_06.png",
"boss_07.png","boss_08.png","boss_09.png",
"boss_10.png","boss_11.png","boss_12.png",
"boss_13.png","boss_14.png","boss_15.png",
"boss_16.png","boss_17.png","boss_18.png"
];

const magicWords=[
"大丈夫、そのままでいい",
"ゆるめばうまくいく",
"その優しさはもう持ってる",
"安心して進んでいい",
"もう守られている"
];

function enter(){
  document.getElementById("app").innerHTML=`
    <h3>🌈選んでね</h3>

    <button onclick="drawTarot()">タロット1枚</button>
    <button onclick="drawTarot3()">タロット3枚</button>

    <hr>

    <button onclick="drawBoss()">今のラスボス</button>
    <button onclick="drawBoss3()">ラスボス3枚</button>
  `;
}

// タロット1枚
function drawTarot(){
  let r=Math.floor(Math.random()*tarotImages.length);
  let card=tarotImages[r];

  document.getElementById("app").innerHTML=`
    <div class="card">
      <img src="images/${card}">
    </div>

    <button class="copy" onclick="copyText('${card}')">コピー🐾</button>
    <button class="ai" onclick="copyAI('${card}')">AI🤖</button>
  `;
}

// タロット3枚
function drawTarot3(){
  let results=[];
  let html="";

  for(let i=0;i<3;i++){
    let r=Math.floor(Math.random()*tarotImages.length);
    let card=tarotImages[r];
    results.push(card);

    html+=`
      <div class="card">
        <img src="images/${card}">
      </div>
    `;
  }

  document.getElementById("app").innerHTML=`
    ${html}

    <div class="box">
      <button class="copy" onclick="copyAll('${results.join(",")}')">3枚まとめコピー🐾</button>
      <button class="ai" onclick="aiNow('${results.join(",")}')">今の流れAI🤖</button>
      <button class="ai" onclick="aiAfter('${results.join(",")}')">気づいたあとAI🌈</button>
    </div>
  `;
}

// ラスボス1枚
function drawBoss(){
  let r=Math.floor(Math.random()*bossImages.length);
  let card=bossImages[r];

  document.getElementById("app").innerHTML=`
    <img src="images/boss_hyousi.png" width="250">

    <div class="card">
      <img src="images/${card}">
    </div>

    <button class="copy" onclick="copyText('${card}')">コピー🐾</button>
    <button class="ai" onclick="copyAI('${card}')">AI🤖</button>

    ${magic()}
  `;
}

// ラスボス3枚
function drawBoss3(){
  let results=[];
  let html=`<img src="images/boss_hyousi.png" width="250">`;

  for(let i=0;i<3;i++){
    let r=Math.floor(Math.random()*bossImages.length);
    let card=bossImages[r];
    results.push(card);

    html+=`
      <div class="card">
        <img src="images/${card}">
      </div>
    `;
  }

  document.getElementById("app").innerHTML=`
    ${html}

    <div class="box">
      <button class="copy" onclick="copyAll('${results.join(",")}')">3枚まとめコピー🐾</button>
      <button class="ai" onclick="copyAI('${results.join(",")}')">AI🤖</button>

      ${magic()}
    </div>
  `;
}

// 呪文
function magic(){
  let r=Math.floor(Math.random()*magicWords.length);
  let word=magicWords[r];

  return `
    <div class="box">
      <h3>🌈呪文</h3>
      <p>${word}</p>
      <button class="magic" onclick="copyText('${word}')">コピー🌈</button>
    </div>
  `;
}

// コピー
function copyText(text){
  navigator.clipboard.writeText(text);
  alert("コピーしたよ🐾");
}

function copyAll(text){
  navigator.clipboard.writeText(text);
  alert("まとめコピー完了🐾");
}

// AI
function copyAI(text){
  navigator.clipboard.writeText("このカードをやさしく読み解いてください："+text);
  alert("AI用コピー完了🤖");
}

// AI（今）
function aiNow(text){
  let t=`この3枚のカードから今の流れをやさしく読み解いてください。
・今の状態
・気づいていないこと
・これからの流れ
${text}`;
  navigator.clipboard.writeText(t);
  alert("コピー完了🤖");
}

// AI（気づいたあと）
function aiAfter(text){
  let t=`この3枚は気づいたあとに引いたカードです。
これからどう整えていくとよいかをやさしく読み解いてください。
・活かし方
・ゆるめること
・一歩
${text}`;
  navigator.clipboard.writeText(t);
  alert("コピー完了🌈");
}

// 事前プロンプト
function copyPrompt(){
  let p=`やさしく、安心できる言葉でカードを読み解いてください。
否定や断定はせず、可能性として伝えてください。`;
  navigator.clipboard.writeText(p);
  alert("プロンプトコピーしたよ🐾");
}

</script>

</body>
</html>
