<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チャッピー＆サリーのタロットカード</title>

<style>
body{
  font-family:"Hiragino Kaku Gothic ProN", sans-serif;
  text-align:center;
  background:#fff0f5;
  padding:20px;
  color:#5b3a1e;
  margin:0;
}
.hidden{display:none;}

.title-wrap{
  display:flex;justify-content:center;align-items:center;
  gap:15px;margin-top:10px;
}
.title-icon{font-size:32px;}
h1{font-size:26px;margin:0;}

.welcome-img,.header-img{
  width:80%;max-width:400px;border-radius:20px;
  margin:18px 0;box-shadow:0 6px 14px rgba(0,0,0,0.12);
}

.desc{font-size:18px;line-height:1.8;margin:14px 0;}

input{
  width:82%;max-width:360px;padding:14px;
  border-radius:22px;border:2px solid #d6b6ff;
  margin-bottom:12px;font-size:17px;
}

button{
  padding:14px 22px;margin:6px;border:none;
  border-radius:30px;color:white;font-size:18px;
  cursor:pointer;
}

.main-btn{background:linear-gradient(135deg,#f7c1cc,#c9b6ff);}
.boss-btn{background:linear-gradient(135deg,#233b6e,#6d85c4);}
.back-btn{background:linear-gradient(135deg,#a89adb,#cdbff4);}
.prompt-btn{background:linear-gradient(135deg,#ffcf7d,#ff9f68);}

.cards-area{
  display:flex;justify-content:center;flex-wrap:wrap;
  gap:20px;margin-top:25px;
}
.card-box{display:flex;flex-direction:column;align-items:center;width:170px;}
.card-box img{width:160px;border-radius:12px;box-shadow:0 6px 14px rgba(0,0,0,0.2);}
.reversed{transform:rotate(180deg);}
</style>
</head>

<body>

<div id="welcome-screen">
  <h1>チャッピー＆サリーのタロットカード</h1>
  <img src="images/CS_hyousi.jpg" class="welcome-img">
  <p class="desc">ようこそ✨</p>

  <button class="main-btn" onclick="showTarotScreen()">部屋をひらく</button>
  <button class="prompt-btn" onclick="copyBasePrompt()">プロンプトCopy</button>
</div>

<div id="tarot-screen" class="hidden">
  <h1>タロット</h1>

  <input id="username" placeholder="名前">
  <input id="question" placeholder="質問">

  <button class="main-btn" onclick="drawTarotOne()">1枚</button>
  <button class="main-btn" onclick="drawTarotThree()">3枚</button>
  <button class="main-btn" onclick="resetAll()">リセット</button>
  <button class="boss-btn" onclick="showBossScreen()">ラスボス</button>
</div>

<div id="boss-screen" class="hidden">
  <h1>ラスボス</h1>

  <button class="boss-btn" onclick="drawBossOne()">1枚</button>
  <button class="boss-btn" onclick="drawBossThree()">3枚</button>
  <button class="back-btn" onclick="showTarotScreen()">戻る</button>
</div>

<div id="cards" class="cards-area"></div>

<script>

const tarotFiles = [
"00_The_Fool.png","01_The_Magician.png","02_The_High_Priestess.png",
"03_The_Empress.png","04_The_Emperor.png","05_The_Hierophant.png",
"06_The_Lovers.png","07_The_Chariot.png","08_Strength.png",
"09_The_Hermit.png","10_Wheel_of_Fortune.png","11_Justice.png",
"12_The_Hanged_Man.png","13_Death.png","14_Temperance.png",
"15_The_Devil.png","16_The_Tower.png","17_The_Star.png",
"18_The_Moon.png","19_The_Sun.png","20_Judgement.png",
"21_The_World.png","22_Compass.png"
];

const bossFiles = [
"boss_people_eyes.png","boss_perfection.png","boss_fear_of_failure.png",
"boss_low_confidence.png","boss_comparison.png","boss_impatience.png"
];

// ===== 被りなしランダム =====
function getRandomItems(list, count){
  const shuffled = [...list].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, count);
}

// ===== 画面操作 =====
function showTarotScreen(){
  document.getElementById("welcome-screen").classList.add("hidden");
  document.getElementById("boss-screen").classList.add("hidden");
  document.getElementById("tarot-screen").classList.remove("hidden");
  clearCards();
}

function showBossScreen(){
  document.getElementById("tarot-screen").classList.add("hidden");
  document.getElementById("boss-screen").classList.remove("hidden");
  clearCards();
}

// ===== リセット（最重要修正）=====
function resetAll(){
  clearCards();
  document.getElementById("username").value = "";
  document.getElementById("question").value = "";

  document.getElementById("tarot-screen").classList.add("hidden");
  document.getElementById("boss-screen").classList.add("hidden");
  document.getElementById("welcome-screen").classList.remove("hidden");
}

// ===== プロンプト修正 =====
function getBasePrompt(){
  return [
    "あなたは、やさしく寄り添うセラピストです。",
    "結果は決めつけず、安心できる言葉で伝えてください。",
    "",
    "次の5つを短く出してください。",
    "1. 今の状態",
    "2. テーマ",
    "3. 守っているもの",
    "4. 小さな一歩",
    "5. やさしい一言",
    "",
    "ラスボスは倒す対象ではなく守ってきた存在です。"
  ].join("\n");
}

function copyBasePrompt(){
  navigator.clipboard.writeText(getBasePrompt());
  alert("コピーしたよ✨");
}

// ===== 共通 =====
function clearCards(){
  document.getElementById("cards").innerHTML = "";
}

function createCard(src, reversed){
  const box = document.createElement("div");
  box.className = "card-box";

  const img = document.createElement("img");
  img.src = "images/" + src;

  if(reversed) img.classList.add("reversed");

  box.appendChild(img);
  return box;
}

// ===== タロット =====
function drawTarotOne(){
  clearCards();
  const card = getRandomItems(tarotFiles,1)[0];
  const reversed = Math.random()<0.5;
  document.getElementById("cards").appendChild(createCard(card,reversed));
}

function drawTarotThree(){
  clearCards();
  const selected = getRandomItems(tarotFiles,3);

  selected.forEach(card=>{
    const reversed = Math.random()<0.5;
    document.getElementById("cards").appendChild(createCard(card,reversed));
  });
}

// ===== ボス =====
function drawBossOne(){
  clearCards();
  const card = getRandomItems(bossFiles,1)[0];
  document.getElementById("cards").appendChild(createCard(card,false));
}

function drawBossThree(){
  clearCards();
  const selected = getRandomItems(bossFiles,3);

  selected.forEach(card=>{
    document.getElementById("cards").appendChild(createCard(card,false));
  });
}

</script>
</body>
</html>
