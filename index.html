<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャッピー＆サリーのタロットカード</title>

  <style>
    body{
      font-family:"Hiragino Kaku Gothic ProN", sans-serif;
      text-align:center;
      background:#fff0f5;
      padding:20px;
      color:#5b3a1e;
      margin:0;
    }

    .hidden{
      display:none;
    }

    .title-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:15px;
      margin-top:10px;
    }

    .side-img{
      width:70px;
    }

    h1{
      color:#5b3a1e;
      font-size:26px;
      line-height:1.4;
      margin:0;
    }

    .welcome-img,
    .header-img{
      width:80%;
      max-width:400px;
      border-radius:20px;
      margin:18px 0;
      box-shadow:0 6px 14px rgba(0,0,0,0.12);
    }

    .desc{
      font-size:15px;
      color:#6b4b2a;
      margin:10px 0 18px;
      line-height:1.7;
    }

    input{
      width:80%;
      max-width:350px;
      padding:12px;
      border-radius:20px;
      border:2px solid #d6b6ff;
      margin-bottom:12px;
      font-size:16px;
      box-sizing:border-box;
      background:white;
    }

    button{
      padding:12px 22px;
      margin:6px;
      border:none;
      border-radius:30px;
      color:white;
      font-size:16px;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    .main-btn{
      background:linear-gradient(135deg,#f7c1cc,#c9b6ff);
    }

    .boss-btn{
      background:linear-gradient(135deg,#233b6e,#3f5f9a,#6d85c4);
    }

    .back-btn{
      background:linear-gradient(135deg,#a89adb,#cdbff4);
    }

    .cards-area{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:20px;
      margin-top:25px;
      min-height:180px;
    }

    .card-box{
      display:flex;
      flex-direction:column;
      align-items:center;
      width:170px;
    }

    .card-box img{
      width:160px;
      border-radius:12px;
      box-shadow:0 6px 14px rgba(0,0,0,0.2);
      background:white;
    }

    .reversed{
      transform:rotate(180deg);
    }

    .label{
      margin-top:8px;
      font-size:14px;
      color:#5b3a1e;
      line-height:1.5;
      min-height:22px;
    }

    .button-row{
      display:flex;
      gap:8px;
      justify-content:center;
      align-items:center;
      margin-top:8px;
    }

    .copy-btn,
    .ai-btn{
      font-size:20px;
      border:none;
      border-radius:50%;
      width:46px;
      height:46px;
      padding:0;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .copy-btn{
      background:linear-gradient(135deg,#f7c1cc,#e6a4b4,#f3d1dc);
      color:white;
      box-shadow:0 4px 10px rgba(230,164,180,0.6);
    }

    .ai-btn{
      background:linear-gradient(135deg,#8bb7ff,#6f8fff,#8e7cff);
      color:white;
      box-shadow:0 4px 10px rgba(111,143,255,0.45);
    }

    .button-group{
      margin-top:10px;
    }
  </style>
</head>

<body>

  <!-- ようこそ画面 -->
  <div id="welcome-screen">
    <div class="title-wrap">
      <img src="images/tarot_back.png" class="side-img" alt="カード裏">
      <h1>チャッピー＆サリーの<br>タロットカード</h1>
      <img src="images/tarot_back.png" class="side-img" alt="カード裏">
    </div>

    <img src="images/CS_hyousi.jpg" class="welcome-img" alt="表紙">

    <p class="desc">
      チャッピーとサリーの部屋へようこそ✨<br>
      自分用にも、セッション用にも使えるよ
    </p>

    <button class="main-btn" onclick="showTarotScreen()">入店する🔘</button>
  </div>

  <!-- タロット画面 -->
  <div id="tarot-screen" class="hidden">
    <div class="title-wrap">
      <img src="images/tarot_back.png" class="side-img" alt="カード裏">
      <h1>チャッピー＆サリーの<br>タロットカード</h1>
      <img src="images/tarot_back.png" class="side-img" alt="カード裏">
    </div>

    <img src="images/CS_hyousi.jpg" class="header-img" alt="表紙">

    <input id="username" placeholder="お名前・ニックネーム（セッション用にも使える）">
    <br>
    <input id="question" placeholder="今日の問いを入れてから引く">

    <div class="button-group">
      <button class="main-btn" onclick="drawTarotOne()">1枚引き</button>
      <button class="main-btn" onclick="drawTarotThree()">3枚引き</button>
      <button class="main-btn" onclick="resetAll()">リセット</button>
    </div>

    <div class="button-group">
      <button class="boss-btn" onclick="showBossScreen()">ラスボスをみつける🔘</button>
    </div>
  </div>

  <!-- ラスボス画面 -->
  <div id="boss-screen" class="hidden">
    <div class="title-wrap">
      <img src="images/tarot_back.png" class="side-img" alt="カード裏">
      <h1>ラスボスをみつける</h1>
      <img src="images/tarot_back.png" class="side-img" alt="カード裏">
    </div>

    <p class="desc">
      今の心にひそんでいるラスボスを<br>
      やさしく見つけてみよう✨
    </p>

    <div class="button-group">
      <button class="boss-btn" onclick="drawBossOne()">1枚引き</button>
      <button class="boss-btn" onclick="drawBossThree()">3枚引き</button>
      <button class="back-btn" onclick="showTarotScreen()">タロットへ戻る</button>
    </div>
  </div>

  <!-- 共通表示エリア -->
  <div class="cards-area" id="cards"></div>

  <script>
    const tarotFiles = [
      "00_The_Fool.png",
      "01_The_Magician.png",
      "02_The_High_Priestess.png",
      "03_The_Empress.png",
      "04_The_Emperor.png",
      "05_The_Hierophant.png",
      "06_The_Lovers.png",
      "07_The_Chariot.png",
      "08_Strength.png",
      "09_The_Hermit.png",
      "10_Wheel_of_Fortune.png",
      "11_Justice.png",
      "12_The_Hanged_Man.png",
      "13_Death.png",
      "14_Temperance.png",
      "15_The_Devil.png",
      "16_The_Tower.png",
      "17_The_Star.png",
      "18_The_Moon.png",
      "19_The_Sun.png",
      "20_Judgement.png",
      "21_The_World.png",
      "22_Compass.png"
    ];

    const bossFiles = [
      "boss_people_eyes.png",
      "boss_perfection.png",
      "boss_fear_of_failure.png",
      "boss_low_confidence.png",
      "boss_comparison.png",
      "boss_impatience.png",
      "boss_anxiety.png",
      "boss_attachment.png",
      "boss_past.png",
      "boss_future_worry.png",
      "boss_money.png",
      "boss_overwork.png",
      "boss_guilt.png",
      "boss_give_up.png",
      "boss_endurance.png",
      "boss_obligation.png",
      "boss_hesitation.png",
      "boss_return_to_self.png"
    ];

    function getRandomItem(list){
      return list[Math.floor(Math.random() * list.length)];
    }

    function getUserName(){
      return document.getElementById("username").value.trim();
    }

    function getQuestion(){
      return document.getElementById("question").value.trim();
    }

    function copyToClipboard(text){
      navigator.clipboard.writeText(text);
      alert("コピーしたよ✨\n" + text);
    }

    function clearCards(){
      document.getElementById("cards").innerHTML = "";
    }

    function showTarotScreen(){
      document.getElementById("welcome-screen").classList.add("hidden");
      document.getElementById("boss-screen").classList.add("hidden");
      document.getElementById("tarot-screen").classList.remove("hidden");
      clearCards();
    }

    function showBossScreen(){
      document.getElementById("welcome-screen").classList.add("hidden");
      document.getElementById("tarot-screen").classList.add("hidden");
      document.getElementById("boss-screen").classList.remove("hidden");
      clearCards();
    }

    function makeHeaderText(){
      const name = getUserName();
      return name ? (name + " の結果") : "私の結果";
    }

    function makeTarotAiPrompt(cardName, reversed){
      const name = makeHeaderText();
      const question = getQuestion();
      const position = reversed ? "逆位置" : "正位置";

      let text = name + "\n\n";
      if(question){
        text += "質問：\n" + question + "\n\n";
      }
      text += "引いたカード\n";
      text += cardName.replace(".png","") + "（" + position + "）\n\n";
      text += "このカードをやさしく読み解いてください。\n\n";
      text += "・今の状態\n";
      text += "・このカードが伝えたいこと\n";
      text += "・今意識するといいこと\n";
      text += "・やさしい一歩\n";
      return text;
    }

    function makeBossAiPrompt(labelText, bossName){
      const name = makeHeaderText();
      const question = getQuestion();

      let text = name + "\n\n";
      if(question){
        text += "質問：\n" + question + "\n\n";
      }
      text += labelText + "\n";
      text += bossName.replace(".png","") + "\n\n";
      text += "このラスボスをやさしく読み解いてください。\n\n";
      text += "これは倒す対象ではなく、私を守ってきた一部として扱ってください。\n\n";
      text += "・今の私の状態\n";
      text += "・このラスボスの役割\n";
      text += "・なぜ今現れているのか\n";
      text += "・共存のヒント\n";
      text += "・やさしい問い\n";
      return text;
    }

    function createTarotCard(labelText = ""){
      const card = getRandomItem(tarotFiles);

      const box = document.createElement("div");
      box.className = "card-box";

      const img = document.createElement("img");
      img.src = "images/" + card;
      img.alt = card;

      const reversed = Math.random() < 0.5;
      if(reversed){
        img.classList.add("reversed");
      }

      const positionText = reversed ? "（逆位置）" : "（正位置）";
      const copyText = makeHeaderText() + "\n" + card.replace(".png","") + positionText;
      const aiText = makeTarotAiPrompt(card, reversed);

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = labelText;

      const copyBtn = document.createElement("button");
      copyBtn.className = "copy-btn";
      copyBtn.textContent = "🐾";
      copyBtn.onclick = () => copyToClipboard(copyText);

      const aiBtn = document.createElement("button");
      aiBtn.className = "ai-btn";
      aiBtn.textContent = "🤖";
      aiBtn.onclick = () => copyToClipboard(aiText);

      const btnRow = document.createElement("div");
      btnRow.className = "button-row";
      btnRow.appendChild(copyBtn);
      btnRow.appendChild(aiBtn);

      box.appendChild(img);
      if(labelText !== ""){
        box.appendChild(label);
      }
      box.appendChild(btnRow);

      return box;
    }

    function createBossCard(labelText){
      const boss = getRandomItem(bossFiles);

      const box = document.createElement("div");
      box.className = "card-box";

      const img = document.createElement("img");
      img.src = "images/" + boss;
      img.alt = boss;

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = labelText;

      const copyText = makeHeaderText() + "\n" + labelText + "\n" + boss.replace(".png","");
      const aiText = makeBossAiPrompt(labelText, boss);

      const copyBtn = document.createElement("button");
      copyBtn.className = "copy-btn";
      copyBtn.textContent = "🐾";
      copyBtn.onclick = () => copyToClipboard(copyText);

      const aiBtn = document.createElement("button");
      aiBtn.className = "ai-btn";
      aiBtn.textContent = "🤖";
      aiBtn.onclick = () => copyToClipboard(aiText);

      const btnRow = document.createElement("div");
      btnRow.className = "button-row";
      btnRow.appendChild(copyBtn);
      btnRow.appendChild(aiBtn);

      box.appendChild(img);
      box.appendChild(label);
      box.appendChild(btnRow);

      return box;
    }

    function drawTarotOne(){
      clearCards();
      document.getElementById("cards").appendChild(createTarotCard(""));
    }

    function drawTarotThree(){
      clearCards();
      document.getElementById("cards").appendChild(createTarotCard(""));
      document.getElementById("cards").appendChild(createTarotCard(""));
      document.getElementById("cards").appendChild(createTarotCard(""));
    }

    function drawBossOne(){
      clearCards();
      document.getElementById("cards").appendChild(createBossCard("今のラスボス"));
    }

    function drawBossThree(){
      clearCards();
      document.getElementById("cards").appendChild(createBossCard("今のラスボス"));
      document.getElementById("cards").appendChild(createBossCard("隠れラスボス"));
      document.getElementById("cards").appendChild(createBossCard("心のボス戦"));
    }

    function resetAll(){
      clearCards();
      document.getElementById("question").value = "";
      document.getElementById("username").value = "";
    }
  </script>

</body>
</html>
